spring:
  application:
    name:  -ai-agent
  profiles:
    active: local
  ai:
    dashscope:
      api-key: sk-dd4b2ee7b44f468281f2adc443b43e74
  datasource:
    mysql:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/ ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
        username: root
        password: 123456
server:
  port: 8102
  servlet:
    context-path: /api
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.licanfu. aiagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn
logging:
  level:
#    org.springframework.ai.chat.advisor.SimpleChatAdvisor: DEBUG
    org.springframework.ai: DEBUG
