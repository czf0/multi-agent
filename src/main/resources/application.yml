spring:
  application:
    name: multi-ai-agent
  profiles:
    active: local
  ai:
    dashscope:
      api-key: ${MODEL_API_KEY}
      base-url: ${MODEL_BASE_URL}
      chat:
        enabled: false
    ollama:
      base-url: ${MODEL_BASE_URL}
      chat:
        enabled: false
    openai:
      api-key: ${MODEL_API_KEY}
      base-url: ${MODEL_BASE_URL}
  datasource:
    mysql:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
        username: ${MYSQL_USER:root}
        password: ${MYSQL_PASSWORD:root}
server:
  port: 8102
  servlet:
    context-path: /api
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.czf.aiagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn
logging:
  level:
#    org.springframework.ai.chat.advisor.SimpleChatAdvisor: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.ai.chat.client: TRACE
    org.springframework.ai.chat.client.advisor: TRACE
    org.springframework.ai.chat.memory: TRACE
    com.alibaba.dashscope: DEBUG
    reactor.netty: DEBUG
    org.springframework.web.reactive: DEBUG
